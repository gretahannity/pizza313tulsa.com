<html lang="en">
<head>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza 313 Tulsa | Authentic Detroit Style</title>
    <style>
        :root {
            --bg: #fff7ed; /* Light flour/dough color */
            --sauce: #b91c1c; /* Deep Tomato Red */
            --crust: #d97706; /* Golden Brown */
            --cheese: #fbbf24; /* Melty Yellow */
            --slate: #451a03;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fatface', 'Arial Black', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--slate);
        }

        /* Floating Pizzas Background */
        .pizza-rain {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .pizza {
            position: absolute;
            font-size: 3rem;
            user-select: none;
            animation: spin-float 10s infinite linear;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        @keyframes spin-float {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(110vh) translateX(20px) rotate(360deg);
                opacity: 0;
            }
        }

        /* The Pizza Box Card */
        .card {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(185, 28, 28, 0.15);
            text-align: center;
            max-width: 360px;
            width: 90%;
            border-bottom: 8px solid var(--sauce);
            animation: boxOpen 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes boxOpen {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .brand {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--sauce);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            font-family: sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--crust);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        p {
            font-family: sans-serif;
            font-size: 0.9rem;
            color: #713f12;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: block;
            background: var(--sauce);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .btn:hover {
            background: transparent;
            color: var(--sauce);
            border-color: var(--sauce);
            transform: scale(1.05);
        }

        .location-tag {
            margin-top: 1.5rem;
            font-family: sans-serif;
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="pizza-rain">
        <div class="pizza" style="left: 15%; animation-delay: 0s;">🍕</div>
        <div class="pizza" style="left: 45%; animation-delay: 3s; font-size: 2rem;">🍕</div>
        <div class="pizza" style="left: 75%; animation-delay: 6s; font-size: 4rem;">🍕</div>
        <div class="pizza" style="left: 25%; animation-delay: 8s;">🍕</div>
        <div class="pizza" style="left: 85%; animation-delay: 2s; font-size: 2.5rem;">🍕</div>
        <div class="pizza" style="left: 5%; animation-delay: 5s;">🍕</div>
    </div>

    <div class="card">
        <div class="brand">PIZZA 313</div>
        <div class="subtitle">Tulsa, Oklahoma</div>
        <h1>Deep Dish. <br>Square Cut. <br>Local Soul.</h1>
        <p>Bringing that motor city crunch to the heart of Tulsa. Built different, baked better.</p>
        
        <a href="http://bseo.cooooooooooooooool.pp.ua" class="btn">VIEW THE MENU</a>

        <div class="location-tag">
            EST. 2026 • THE 313 EXPERIENCE
        </div>
    </div>

</body>
</html>
